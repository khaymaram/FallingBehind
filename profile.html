<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href='https://fonts.googleapis.com/css?family=Pixelify Sans' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="profile-content">
        <div id="navbar">
            <button class="nav-button" id="mywalks-tab">My Walks</button>
            <button class="nav-button" id="walkrecs-tab">Walk Recs</button>
            <button class="nav-button" id="profile-tab">Profile</button>
            <img src="assets/falling-leaves-2.gif">
            <img src="assets/falling-leaves-2.gif" id="gif2">
            <img src="assets/falling-leaves-2.gif">
        </div>
        <h1 class="title" id="profile-title">My Profile</h1>
        <div class="profile-card">
            <div style="display: flex; flex-direction: row; align-items: flex-start; gap:20px" >
                <img src="assets/pfp.svg" width="100px" style="margin-top: 15px;"/>
                <div class="profile-row">
                    <h1 id="profile-name"></h1>
                    <div style="width: 100%;">
                        <div class="progress-stats">
                            Goal: <span id="current-miles">0</span> / <span id="goal-miles">0</span> miles
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="progress-fill" style="width: 0%;">
                                0%
                            </div>
                        </div>
                        <div class="progress-stats" style="font-size: 18px;">
                            <span id="remaining-miles">0</span> miles to go!
                        </div>
                        <div class="congrats-message" id="congrats">
                            🎉 Goal Reached! 🎉
                        </div>
                    </div>
                </div>
            </div>

            <div class="profile-row">
                <h1 id="badges">BADGES</h1>
                <div id="badge-content">
                    <p>Complete milestones to earn badges!</p>
                </div>
            </div>

        </div>

    </div>
    <script src="functions.js"></script>
</body>

</html>
