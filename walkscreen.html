<!DOCTYPE html>
<html>
<head>
    <link href='https://fonts.googleapis.com/css?family=Pixelify Sans' rel='stylesheet'>
    <title>Walk Screen</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title">My Walks</h1>
    <img src="assets/leaf.png" alt="leaf">
    <button onclick = "openPopUp()" class = "button" id="AddWalk">Add Walk</button>
    <div id="WalkInfoPopup" class = "form-popup">
        <form action = "/submit-form" method = "post" class = "form-container">
            <h2>Add a Walk!</h2>
            <label for = "walkDate">Date: </label>
            <input type = "date" id = "walkDate">

            <label for = "walkTime">Walk Time: </label>
            <input type = "text" id = "walkTime" name = "walkTime">

            <label for = "walkDistance">Distance: </label>
            <input type = "text" id = "walkDistance" name = "walkDistance">

            <button onclick = "closePopup()" id="RecordWalk" class = "submit">Record Walk</button>
        </form> 
    </div>
</body>
<script src="functions.js"></script>
    <div id="my-walks-content">
        <div id="navbar">
            <button class="nav-button" id="mywalks-tab">My Walks</button>
            <button class="nav-button" id="walkrecs-tab">Walk Recs</button>
            <button class="nav-button" id="profile-tab">Profile</button>
        </div>
        <h1 class="title" id="mywalks-title">My Walks</h1>
        <img src="assets/leaf.png" alt="leaf">
    </div>
    <script src="functions.js"></script>

</body>
</html>
